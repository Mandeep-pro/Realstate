<!doctype html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Welcome to Sucxessful</title>
	</head>
	<body>
		<h1>Welcome to Sucxessful</h1>

		<form action="{{ url_for('submit') }}" method="post">
			<div>
				<label for="name">Name:</label>
				<input type="text" id="name" name="name" required>
			</div>
			<div>
				<label for="email">Email:</label>
				<input type="email" id="email" name="email">
			</div>
			<div>
				<label for="message">Message:</label><br>
				<textarea id="message" name="message" rows="4" cols="40"></textarea>
			</div>
			<div>
				<button type="submit">Send</button>
			</div>
		</form>

		<hr>
		<h2>Jinja2 examples</h2>
		- <strong>Dynamic link:</strong> <a href="{{ url_for('hello', name='Alice') }}">Greet Alice</a>
		- <strong>Variable rule:</strong> visit <code>/hello/&lt;name&gt;</code> — for example <a href="{{ url_for('hello', name='Bob') }}">/hello/Bob</a>

	</body>
</html>
